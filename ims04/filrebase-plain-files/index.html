<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase Notes</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --border: #e5e5ea;
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    h1 { margin: 0; font-size: 1.5rem; }
    .user {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .user img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }
    .user-name { font-size: 0.9rem; color: var(--muted); }
    button {
      font: inherit;
      padding: 0.6rem 1.1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--accent);
      color: white;
      font-weight: 500;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button.secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    button.secondary:hover { background: var(--border); }
    button.danger {
      background: transparent;
      color: var(--danger);
      padding: 0.3rem 0.6rem;
      font-size: 0.85rem;
    }
    button.danger:hover { background: #fee2e2; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .signin-card {
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .signin-card p { color: var(--muted); margin-bottom: 1.5rem; }
    form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      background: var(--card);
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .note {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }
    .note-text { flex: 1; word-break: break-word; }
    .note-author { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 2rem;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔥 Firebase Notes</h1>
      <div id="user-info" class="user hidden">
        <img id="user-avatar" alt="" />
        <span id="user-name" class="user-name"></span>
        <button id="signout-btn" class="secondary">Sign out</button>
      </div>
    </header>

    <div id="signin-view" class="card signin-card hidden">
      <p>Sign in to save and sync your notes.</p>
      <button id="signin-btn">Sign in with Google</button>
    </div>

    <div id="app-view" class="hidden">
      <form id="note-form">
        <input id="note-input" type="text" placeholder="Write a note..." required />
        <button type="submit">Add</button>
      </form>
      <div id="notes-list"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      doc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔧 REPLACE THIS with your Firebase config from the console
// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCohdWaD0KOQUVbvEP3wSbZ31Bs98A8W9w",
  authDomain: "fb-notes-7d54a.firebaseapp.com",
  projectId: "fb-notes-7d54a",
  storageBucket: "fb-notes-7d54a.firebasestorage.app",
  messagingSenderId: "1005580277834",
  appId: "1:1005580277834:web:54cc48f167414dcbb7eeb3"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // DOM
    const signinView = document.getElementById("signin-view");
    const appView = document.getElementById("app-view");
    const userInfo = document.getElementById("user-info");
    const userAvatar = document.getElementById("user-avatar");
    const userName = document.getElementById("user-name");
    const signinBtn = document.getElementById("signin-btn");
    const signoutBtn = document.getElementById("signout-btn");
    const noteForm = document.getElementById("note-form");
    const noteInput = document.getElementById("note-input");
    const notesList = document.getElementById("notes-list");

    let unsubscribeNotes = null;

    // Auth handlers
    signinBtn.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        console.error("Sign-in failed:", err);
        alert("Sign-in failed: " + err.message);
      }
    });

    signoutBtn.addEventListener("click", () => signOut(auth));

    // Auth state → show/hide views, subscribe to notes
    onAuthStateChanged(auth, (user) => {
      if (user) {
        signinView.classList.add("hidden");
        appView.classList.remove("hidden");
        userInfo.classList.remove("hidden");
        userAvatar.src = user.photoURL || "";
        userName.textContent = user.displayName || user.email;
        subscribeToNotes(user.uid);
      } else {
        signinView.classList.remove("hidden");
        appView.classList.add("hidden");
        userInfo.classList.add("hidden");
        notesList.innerHTML = "";
        if (unsubscribeNotes) {
          unsubscribeNotes();
          unsubscribeNotes = null;
        }
      }
    });

    // Firestore: add note
    noteForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = noteInput.value.trim();
      if (!text || !auth.currentUser) return;
      try {
        await addDoc(collection(db, "notes"), {
          text,
          uid: auth.currentUser.uid,
          author: auth.currentUser.displayName || auth.currentUser.email,
          createdAt: serverTimestamp(),
        });
        noteInput.value = "";
      } catch (err) {
        console.error("Add failed:", err);
        alert("Could not add note: " + err.message);
      }
    });

    // Firestore: live subscription to ALL notes (shared across users)
    function subscribeToNotes(uid) {
      const q = query(
        collection(db, "notes"),
        orderBy("createdAt", "desc")
      );
      unsubscribeNotes = onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
          notesList.innerHTML = '<div class="empty">No notes yet. Add one above.</div>';
          return;
        }
        notesList.innerHTML = "";
        snapshot.forEach((docSnap) => {
          const note = docSnap.data();
          const row = document.createElement("div");
          row.className = "note";
          const textWrap = document.createElement("div");
          textWrap.style.flex = "1";
          const text = document.createElement("div");
          text.className = "note-text";
          text.textContent = note.text;
          const author = document.createElement("div");
          author.className = "note-author";
          author.textContent = note.author || "Anonymous";
          textWrap.appendChild(text);
          textWrap.appendChild(author);
          row.appendChild(textWrap);
          // Only the note's owner can delete it
          if (note.uid === uid) {
            const delBtn = document.createElement("button");
            delBtn.className = "danger";
            delBtn.textContent = "Delete";
            delBtn.addEventListener("click", () => deleteDoc(doc(db, "notes", docSnap.id)));
            row.appendChild(delBtn);
          }
          notesList.appendChild(row);
        });
      });
    }
  </script>
</body>
</html>
