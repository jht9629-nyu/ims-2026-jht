<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase Notes</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --border: #e5e5ea;
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    h1 { margin: 0; font-size: 1.5rem; }
    .user {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .user img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }
    .user-name { font-size: 0.9rem; color: var(--muted); }
    button {
      font: inherit;
      padding: 0.6rem 1.1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--accent);
      color: white;
      font-weight: 500;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button.secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    button.secondary:hover { background: var(--border); color: var(--text); }
    button.danger {
      background: transparent;
      color: var(--danger);
      padding: 0.3rem 0.6rem;
      font-size: 0.85rem;
    }
    button.danger:hover { background: #fee2e2; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .signin-card {
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .signin-card p { color: var(--muted); margin-bottom: 1.5rem; }
    form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      background: var(--card);
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    .note {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }
    .note-text { flex: 1; word-break: break-word; }
    .note-author { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 2rem;
    }
    .hidden { display: none !important; }

    /* Canvas */
    .canvas-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .canvas-toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .canvas-toolbar label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
    }
    .canvas-toolbar input[type="color"] {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1px;
      cursor: pointer;
      background: none;
    }
    .canvas-toolbar input[type="range"] {
      width: 80px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    #clear-canvas-btn { margin-left: auto; }
    #draw-canvas {
      display: block;
      width: 100%;
      cursor: crosshair;
      touch-action: none;
      background: #fff;
    }
    h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔥 Firebase Notes</h1>
      <div id="user-info" class="user hidden">
        <img id="user-avatar" alt="" />
        <span id="user-name" class="user-name"></span>
        <button id="signout-btn" class="secondary">Sign out</button>
      </div>
    </header>

    <div id="signin-view" class="card signin-card hidden">
      <p>Sign in to save and sync your notes.</p>
      <button id="signin-btn">Sign in with Google</button>
    </div>

    <div id="app-view" class="hidden">
      <!-- Shared canvas -->
      <h2>Shared Canvas</h2>
      <div class="canvas-card">
        <div class="canvas-toolbar">
          <label>Color <input type="color" id="draw-color" value="#2563eb" /></label>
          <label>Size <input type="range" id="draw-size" min="1" max="24" value="4" /></label>
          <button id="clear-canvas-btn" class="secondary">Clear all</button>
        </div>
        <canvas id="draw-canvas" height="400"></canvas>
      </div>

      <!-- Notes -->
      <h2>Shared Notes</h2>
      <form id="note-form">
        <input id="note-input" type="text" placeholder="Write a note..." required />
        <button type="submit">Add</button>
      </form>
      <div id="notes-list"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      getDocs,
      doc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      writeBatch,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCohdWaD0KOQUVbvEP3wSbZ31Bs98A8W9w",
      authDomain: "fb-notes-7d54a.firebaseapp.com",
      projectId: "fb-notes-7d54a",
      storageBucket: "fb-notes-7d54a.firebasestorage.app",
      messagingSenderId: "1005580277834",
      appId: "1:1005580277834:web:54cc48f167414dcbb7eeb3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // DOM
    const signinView  = document.getElementById("signin-view");
    const appView     = document.getElementById("app-view");
    const userInfo    = document.getElementById("user-info");
    const userAvatar  = document.getElementById("user-avatar");
    const userName    = document.getElementById("user-name");
    const signinBtn   = document.getElementById("signin-btn");
    const signoutBtn  = document.getElementById("signout-btn");
    const noteForm    = document.getElementById("note-form");
    const noteInput   = document.getElementById("note-input");
    const notesList   = document.getElementById("notes-list");

    // Canvas DOM
    const canvas      = document.getElementById("draw-canvas");
    const ctx         = canvas.getContext("2d");
    const colorPicker = document.getElementById("draw-color");
    const sizePicker  = document.getElementById("draw-size");
    const clearBtn    = document.getElementById("clear-canvas-btn");

    let unsubscribeNotes   = null;
    let unsubscribeStrokes = null;

    // ── Auth ─────────────────────────────────────────────────────────────────

    signinBtn.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        console.error("Sign-in failed:", err);
        alert("Sign-in failed: " + err.message);
      }
    });

    signoutBtn.addEventListener("click", () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      if (user) {
        signinView.classList.add("hidden");
        appView.classList.remove("hidden");
        userInfo.classList.remove("hidden");
        userAvatar.src = user.photoURL || "";
        userName.textContent = user.displayName || user.email;
        initCanvas();
        subscribeToStrokes();
        subscribeToNotes(user.uid);
      } else {
        signinView.classList.remove("hidden");
        appView.classList.add("hidden");
        userInfo.classList.add("hidden");
        notesList.innerHTML = "";
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (unsubscribeNotes)   { unsubscribeNotes();   unsubscribeNotes = null; }
        if (unsubscribeStrokes) { unsubscribeStrokes(); unsubscribeStrokes = null; }
      }
    });

    // ── Notes ────────────────────────────────────────────────────────────────

    noteForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = noteInput.value.trim();
      if (!text || !auth.currentUser) return;
      try {
        await addDoc(collection(db, "notes"), {
          text,
          uid: auth.currentUser.uid,
          author: auth.currentUser.displayName || auth.currentUser.email,
          createdAt: serverTimestamp(),
        });
        noteInput.value = "";
      } catch (err) {
        console.error("Add failed:", err);
        alert("Could not add note: " + err.message);
      }
    });

    function subscribeToNotes(uid) {
      const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));
      unsubscribeNotes = onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
          notesList.innerHTML = '<div class="empty">No notes yet. Add one above.</div>';
          return;
        }
        notesList.innerHTML = "";
        snapshot.forEach((docSnap) => {
          const note = docSnap.data();
          const row = document.createElement("div");
          row.className = "note";
          const textWrap = document.createElement("div");
          textWrap.style.flex = "1";
          const textEl = document.createElement("div");
          textEl.className = "note-text";
          textEl.textContent = note.text;
          const authorEl = document.createElement("div");
          authorEl.className = "note-author";
          authorEl.textContent = note.author || "Anonymous";
          textWrap.appendChild(textEl);
          textWrap.appendChild(authorEl);
          row.appendChild(textWrap);
          if (note.uid === uid) {
            const delBtn = document.createElement("button");
            delBtn.className = "danger";
            delBtn.textContent = "Delete";
            delBtn.addEventListener("click", () => deleteDoc(doc(db, "notes", docSnap.id)));
            row.appendChild(delBtn);
          }
          notesList.appendChild(row);
        });
      });
    }

    // ── Canvas ───────────────────────────────────────────────────────────────

    let allStrokes = []; // [{points, color, width}] sorted by createdAt
    let isDrawing  = false;
    let currentPts = [];

    function initCanvas() {
      canvas.width = canvas.offsetWidth;
      redrawAll();
    }

    window.addEventListener("resize", () => {
      canvas.width = canvas.offsetWidth;
      redrawAll();
    });

    function redrawAll() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of allStrokes) paintStroke(s);
    }

    // Points are stored as normalized [0,1] fractions so strokes look right
    // at any canvas width/height.
    function paintStroke(stroke) {
      const pts = stroke.points;
      if (!pts || pts.length < 2) return;
      ctx.beginPath();
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth   = stroke.width;
      ctx.lineCap     = "round";
      ctx.lineJoin    = "round";
      ctx.moveTo(pts[0].x * canvas.width, pts[0].y * canvas.height);
      for (let i = 1; i < pts.length; i++) {
        ctx.lineTo(pts[i].x * canvas.width, pts[i].y * canvas.height);
      }
      ctx.stroke();
    }

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - r.left) / canvas.width,
        y: (src.clientY - r.top)  / canvas.height,
      };
    }

    function startDraw(e) {
      if (!auth.currentUser) return;
      e.preventDefault();
      isDrawing  = true;
      currentPts = [getPos(e)];
    }

    function moveDraw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      const pt = getPos(e);
      currentPts.push(pt);
      // Live preview
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      redrawAll();
      paintStroke({ points: currentPts, color: colorPicker.value, width: +sizePicker.value });
    }

    async function endDraw(e) {
      if (!isDrawing) return;
      isDrawing = false;
      if (currentPts.length < 2) return;
      try {
        await addDoc(collection(db, "strokes"), {
          points   : currentPts,
          color    : colorPicker.value,
          width    : +sizePicker.value,
          uid      : auth.currentUser.uid,
          createdAt: serverTimestamp(),
        });
      } catch (err) {
        console.error("Stroke save failed:", err);
      }
      currentPts = [];
    }

    canvas.addEventListener("mousedown",  startDraw);
    canvas.addEventListener("mousemove",  moveDraw);
    canvas.addEventListener("mouseup",    endDraw);
    canvas.addEventListener("mouseleave", endDraw);
    canvas.addEventListener("touchstart", startDraw, { passive: false });
    canvas.addEventListener("touchmove",  moveDraw,  { passive: false });
    canvas.addEventListener("touchend",   endDraw);

    function subscribeToStrokes() {
      const q = query(collection(db, "strokes"), orderBy("createdAt", "asc"));
      unsubscribeStrokes = onSnapshot(q, (snapshot) => {
        allStrokes = [];
        snapshot.forEach((d) => allStrokes.push(d.data()));
        redrawAll();
      });
    }

    clearBtn.addEventListener("click", async () => {
      if (!auth.currentUser) return;
      if (!confirm("Clear the entire canvas for everyone?")) return;
      try {
        const snap = await getDocs(collection(db, "strokes"));
        const batch = writeBatch(db);
        snap.forEach((d) => batch.delete(d.ref));
        await batch.commit();
      } catch (err) {
        console.error("Clear failed:", err);
        alert("Could not clear canvas: " + err.message);
      }
    });
  </script>
</body>
</html>
